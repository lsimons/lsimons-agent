name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: Install Python dependencies
        run: mise run py:install

      - name: Install Node dependencies
        run: cd packages/lsimons-agent-electron && npm ci

      - name: Build
        run: cd packages/lsimons-agent-electron && npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@2d6a3a15d0dea2a4c5a4765c07e8c58bb5d41893 # v5
        with:
          name: mac-build
          path: |
            packages/lsimons-agent-electron/dist/*.dmg
            packages/lsimons-agent-electron/dist/*.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: Install Python dependencies
        run: mise run py:install

      - name: Install Node dependencies
        run: cd packages/lsimons-agent-electron && npm ci

      - name: Build
        run: cd packages/lsimons-agent-electron && npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@2d6a3a15d0dea2a4c5a4765c07e8c58bb5d41893 # v5
        with:
          name: windows-build
          path: packages/lsimons-agent-electron/dist/*.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: Install Python dependencies
        run: mise run py:install

      - name: Install Node dependencies
        run: cd packages/lsimons-agent-electron && npm ci

      - name: Build
        run: cd packages/lsimons-agent-electron && npm run build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@2d6a3a15d0dea2a4c5a4765c07e8c58bb5d41893 # v5
        with:
          name: linux-build
          path: packages/lsimons-agent-electron/dist/*.AppImage

  release:
    needs: [build-mac, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@1b79b5a81dc252c98d3be5afcd5ff5db70eb64fc # v6
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@6cbd405e2c4e67a21c47fa9e383d020e4e28b836 # v2
        with:
          files: |
            artifacts/mac-build/*
            artifacts/windows-build/*
            artifacts/linux-build/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
